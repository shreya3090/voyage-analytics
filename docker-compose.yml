version: "3"

services:

  fastapi:
    build: .
    container_name: voyage_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000

  streamlit:
    build: .
    container_name: voyage_dashboard
    ports:
      - "8501:8501"
    command: streamlit run streamlit_app/dashboard.py

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: voyage_mlflow
    ports:
      - "5001:5000"