apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyage-api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voyage-api
  template:
    metadata:
      labels:
        app: voyage-api
    spec:
      containers:
      - name: voyage-api
        image: voyage-api
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: voyage-api-service
spec:
  type: NodePort
  selector:
    app: voyage-api
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30007